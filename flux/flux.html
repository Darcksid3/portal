<!DOCTYPE html>
<html>
<head>
    <meta charset="utf8">
    <title>Mon Flux Tech</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: auto; background: #f4f4f4; }
        header { color : navy; text-align: center;}
        hr {border: 4px solid magenta; width:50%}
        
        a { color: #007bff; text-decoration: none; font-weight: bold; }
        .container {display: flex; flex-wrap: wrap;}
        .row {display: flex; flex-direction: row; justify-content: flex-start;}
        .column {display: flex; flex-direction: column; justify-content: flex-start; }
        .article { background: white; padding: 15px; margin-bottom: 10px; border: 1px dashed navy; border-radius:  8px; shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        .header {color: rgb(53, 132, 211); text-align: center;}
    </style>
</head>
<body>
    <header><h1>Ma Veille Techno</h1><hr></header>
    <main>
        <div class="container">
            <div class="row">
                <div class="column">
                    <div class="header"><h2>Korben</h2></div>
                    <div id="korben">Chargement...</div>
                </div>
                <div class="column">
                    <div class="header"><h2>IT-Conect</h2></div>
                    <div id="it">Chargement...</div>
                </div>
            </div>
            
        </div>
    </main>
    <script>
        const korben = ['korben', 'https://korben.info/feed'];
        const it = ['it', 'https://www.it-connect.fr/feed/'];
        

        function display(site) {
            //* Utilisation d'un convertisseur gratuit pour éviter les problèmes de CORS et de parsing XML
            const apiURL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(site[1])}`;
            fetch(apiURL)
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.items.slice(0, 5).forEach(item => { // On prend les 5 derniers
                        html += `
                            <div class="article">
                                <a href="${item.link}" target="_blank">${item.title}</a>
                                <p style="font-size: 0.8em; color: gray;">Publié le : ${item.pubDate}</p>
                            </div>`;
                    });
                    document.getElementById(site[0]).innerHTML = html;
                })
                .catch(err => console.error("Erreur :", err));
        }
        display(korben);
        display(it);
    </script>
</body>
</html>
